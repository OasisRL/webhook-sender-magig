<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Discord Webhook Sender (Single File)</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff;padding:30px}.box{max-width:760px;margin:auto;background:#111827;padding:24px;border-radius:18px}.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}textarea,input,button{width:100%;padding:12px;border-radius:12px;border:1px solid #334155;background:#0b1220;color:#fff}textarea{min-height:180px;resize:vertical}button{background:#2563eb;border:none;font-weight:700;cursor:pointer;margin-top:12px}.log{white-space:pre-wrap;background:#020617;padding:12px;border-radius:12px;margin-top:12px;min-height:140px}
</style>
</head>
<body>
<div class="box">
<h1>Discord Webhook Sender</h1>
<p>Single HTML file. Paste one webhook URL per line.</p>
<label>Webhooks</label>
<textarea id="hooks" placeholder="https://discord.com/api/webhooks/...&#10;https://discord.com/api/webhooks/...\n"></textarea>
<div class="row">
<div><label>Delay (ms)</label><input id="delay" type="number" value="1000"></div>
<div><label>Username (optional)</label><input id="username" placeholder="Announcement Bot"></div>
</div>
<br>
<label>Message</label>
<textarea id="message" placeholder="Type message here..."></textarea>
<button id="send">Send</button>
<div class="log" id="log">Ready.</div>
</div>
<script>
const log=document.getElementById('log');
const wait=ms=>new Promise(r=>setTimeout(r,ms));
document.getElementById('send').onclick=async()=>{
 const hooks=document.getElementById('hooks').value.split(/\r?\n/).map(v=>v.trim()).filter(Boolean);
 const msg=document.getElementById('message').value.trim();
 const username=document.getElementById('username').value.trim();
 const delay=+document.getElementById('delay').value||0;
 if(!hooks.length)return log.textContent='Add at least one webhook.';
 if(!msg)return log.textContent='Enter a message.';
 let ok=0,fail=0;log.textContent='Sending...\n';
 for(let i=0;i<hooks.length;i++){
  try{
   const body={content:msg}; if(username) body.username=username;
   const r=await fetch(hooks[i],{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
   if(r.ok){ok++;log.textContent+=`[${i+1}/${hooks.length}] Success\n`;}
   else{fail++;log.textContent+=`[${i+1}/${hooks.length}] Failed ${r.status}\n`;}
  }catch(e){fail++;log.textContent+=`[${i+1}/${hooks.length}] Error\n`;}
  if(i<hooks.length-1) await wait(delay);
 }
 log.textContent+=`\nDone | Success:${ok} Failed:${fail}`;
}
</script>
</body>
</html>
